<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mily ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle, #1a001a, #000);
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30vh;
  font-size: 45px;
}

#texto {
  font-size: 22px;
  margin: 20px;
  min-height: 60px;
}

.corazon {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: caer linear infinite;
}

@keyframes caer {
  from {transform: translateY(-10vh);}
  to {transform: translateY(110vh);}
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff004c, #ff66a3);
  color: white;
  margin-top: 20px;
  box-shadow: 0 0 20px #ff4d6d;
}

#final {
  display: none;
  font-size: 35px;
  margin-top: 40vh;
  animation: aparecer 2s ease-in-out;
}

@keyframes aparecer {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<h1>Para Mily ❤️</h1>
<div id="texto"></div>

<button onclick="iniciar()">Tocame 💌</button>

<div id="final">Sos el amor de mi vida 💖✨</div>

audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// corazones cayendo
function crearCorazon() {
  const corazon = document.createElement("div");
  corazon.classList.add("corazon");
  corazon.innerHTML = "❤️";
  corazon.style.left = Math.random() * 100 + "vw";
  corazon.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(corazon);

  setTimeout(() => {
    corazon.remove();
  }, 5000);
}
setInterval(crearCorazon, 150);

// efecto escribir
const mensaje = "Desde que llegaste a mi vida, todo es más lindo... sos mi lugar favorito en el mundo 💖";
let i = 0;

function escribirTexto() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribirTexto, 50);
  }
}

// botón principal
function iniciar() {
  document.querySelector("button").style.display = "none";

  // música (solo funciona si el usuario toca)
  document.getElementById("audio").play();

  escribirTexto();

  // explosión de corazones
  for (let j = 0; j < 50; j++) {
    setTimeout(crearCorazon, j * 50);
  }

  // pantalla final
  setTimeout(() => {
    document.body.innerHTML = '<div id="final" style="display:block;">Te amo Mily 💘✨</div>';
  }, 7000);
}
</script>

</body>
</html>
